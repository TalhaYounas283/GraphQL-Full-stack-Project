version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: graphql-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./express
      dockerfile: Dockerfile
    container_name: graphql-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: root
      DB_NAME: postgres
      JWT_SECRET: secret
      PORT: 5000
    depends_on:
      - db

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: graphql-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_GRAPHQL_ENDPOINT: http://localhost:5000/graphql
    depends_on:
      - backend

volumes:
  postgres_data:
